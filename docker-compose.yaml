services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.0.8
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    environment:
      # Server Config
      - _JAVA_OPTIONS=-Xmx512m
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=hope_lost
      # Disable deprecated YouTube
      - LAVALINK_SERVER_SOURCES_YOUTUBE=false
      # Enable external plugins
      - LAVALINK_SERVER_SOURCES_HTTP=true
      - LAVALINK_SERVER_SOURCES_LOCAL=false
      # Plugin Configuration (Updated for YouTube script fixes)
      - LAVALINK_PLUGINS_0_DEPENDENCY=dev.lavalink.youtube:youtube-plugin:1.18.0
      - LAVALINK_PLUGINS_0_REPOSITORY=https://maven.lavalink.dev/releases
    # No HEALTHCHECK here: Coolify/runtime images may omit curl/wget; first-boot plugin
    # download can exceed typical start_period. Wavelink retries until Lavalink listens.

  bot:
    build: .
    container_name: music_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LAVALINK_HOST=lavalink
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=hope_lost
    depends_on:
      - lavalink
