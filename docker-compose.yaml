services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    environment:
      # Server Config
      - _JAVA_OPTIONS=-Xmx512m
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=hope_lost
      # Disable deprecated YouTube (this removes the warning)
      - LAVALINK_SERVER_SOURCES_YOUTUBE=false
      # Enable external plugins (we already use the youtube-plugin)
      - LAVALINK_SERVER_SOURCES_HTTP=true
      - LAVALINK_SERVER_SOURCES_LOCAL=false

  bot:
    build: .
    container_name: music_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LAVALINK_HOST=lavalink
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=hope_lost
    depends_on:
      - lavalink
