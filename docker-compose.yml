services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
    environment:
      - _JAVA_OPTIONS=-Xmx512m
    networks:
      - lavalink_network

  bot:
    build: .
    container_name: music_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - lavalink
    networks:
      - lavalink_network

networks:
  lavalink_network:
    driver: bridge
