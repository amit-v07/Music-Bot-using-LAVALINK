services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    ports:
      - "2333:2333"
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
    environment:
      - _JAVA_OPTIONS=-Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2333/version -H 'Authorization: hope_lost' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lavalink_network

  bot:
    build: .
    container_name: music_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      lavalink:
        condition: service_healthy
    networks:
      - lavalink_network

networks:
  lavalink_network:
    driver: bridge
